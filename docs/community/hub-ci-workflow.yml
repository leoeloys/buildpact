# BuildPact Community Hub — Squad Validation CI Workflow
#
# Place this file at .github/workflows/validate-squad.yml in the
# buildpact-squads registry repository.
#
# Triggers: runs on every pull request that adds or modifies Squad files.
# Results: posted as step summaries and GitHub annotations on the PR.
#
# Once a PR merges, the Squad is immediately available via:
#   npx buildpact squad add <squad-name>
#
# @see US-049 (Epic 11.2: Squad Contribution Flow with Automated CI)

name: Validate Squad

on:
  pull_request:
    paths:
      - '**/*.md'
      - '**/*.yaml'
      - '**/*.yml'
      - '**/manifest.json'

jobs:
  validate:
    name: Squad Structural & Security Validation
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      checks: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install BuildPact
        run: npm install -g buildpact@latest

      - name: Detect changed Squads
        id: detect
        run: |
          # Find top-level directories changed in this PR
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep -E '^[^/]+/' \
            | awk -F/ '{print $1}' \
            | sort -u \
            | grep -v '^\.' \
            | tr '\n' ' ')
          echo "squads=$CHANGED" >> "$GITHUB_OUTPUT"
          echo "Detected changed squads: $CHANGED"

      - name: Validate changed Squads
        id: validate
        env:
          SQUADS: ${{ steps.detect.outputs.squads }}
          GITHUB_STEP_SUMMARY: ${{ env.GITHUB_STEP_SUMMARY }}
        run: |
          EXIT_CODE=0
          for SQUAD in $SQUADS; do
            if [ -d "$SQUAD" ]; then
              echo "--- Validating: $SQUAD ---"
              buildpact validate-squad "$SQUAD" --ci || EXIT_CODE=1
            fi
          done
          exit $EXIT_CODE

      - name: Post PR comment on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '## ❌ Squad Validation Failed',
                '',
                'One or more checks failed for the Squads in this PR.',
                'Please review the **Check Summary** tab for specific errors and fix instructions.',
                '',
                '### Common fixes',
                '- Ensure `squad.yaml` has all required fields: `name`, `version`, `domain`, `description`, `initial_level`',
                '- Each agent in `agents/*.md` must include all 6 layers: Identity, Persona, Voice DNA, Heuristics, Examples, Handoffs',
                '- Voice DNA must have all 5 sections: Personality Anchors, Opinion Stance, Anti-Patterns, Never-Do Rules, Inspirational Anchors',
                '- Anti-Patterns requires ≥5 prohibited/required pairs (marked with ✘)',
                '- Examples requires ≥3 numbered input/output pairs',
                '- No external URLs, executable code, path traversal, or prompt injection patterns',
                '',
                'See [CONTRIBUTING.md](CONTRIBUTING.md) for the full contribution guide.',
              ].join('\n')
            });

      - name: Post PR comment on success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '## ✅ Squad Validation Passed',
                '',
                'All structural and security checks passed.',
                'A maintainer will review and merge this PR.',
                '',
                'Once merged, your Squad will be instantly available:',
                '```bash',
                'npx buildpact squad add <your-squad-name>',
                '```',
              ].join('\n')
            });
