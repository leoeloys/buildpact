    dir_fix: "Run 'buildpact init' to regenerate project structure"
    ide_pass: "IDE configs valid for: {ides}"
    ide_warn: "Missing IDE configs: {ides}"
    ide_fix: "Run 'buildpact init' to regenerate IDE configurations"
