    discuss_risk_medium: "Medium — touches an existing feature"
    discuss_risk_high: "High — breaking change or critical path"
    discuss_risk_unknown: "Not sure yet"
    discuss_done_q: "How will you know this change is complete?"
    discuss_done_tests: "All existing tests pass"
    discuss_done_new_tests: "New tests written and passing"
    discuss_done_manual: "Manual verification by user"
    discuss_done_deployed: "Deployed and verified in staging"
    discuss_constraints_q: "Any constraints to keep in mind?"
    discuss_constraints_none: "No special constraints"
    discuss_constraints_compat: "Must maintain backwards compatibility"
    discuss_constraints_perf: "Performance-critical path"
    discuss_constraints_security: "Security-sensitive change"
    discuss_opt_other: "Other (I'll describe)"
    discuss_other_prompt: "Please describe:"
    discuss_other_placeholder: "e.g. Specific requirement or constraint"
    discuss_context_header: "Context from Discussion"
  doctor:
    title: "BuildPact Doctor — Health Check"
    node_pass: "Node.js {version} (meets minimum ≥20.x)"
    node_warn: "Node.js {version} — upgrade to 22.x LTS recommended"
    node_fail: "Node.js {version} is below minimum 20.x"
    node_fix: "Install Node.js 20+ from https://nodejs.org"
    git_pass: "Git available ({version})"
    git_fail: "Git not found"
    git_fix: "Install Git from https://git-scm.com"
    dir_pass: "Project structure complete"
