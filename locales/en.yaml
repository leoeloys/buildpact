    squad_warn: "No squads installed"
    squad_fail: "Squad validation failed: {errors}"
    squad_fix: "Check squad.yaml structure — required fields: name, version, domain, description, initial_level"
    summary_healthy: "All checks passed — project is healthy"
    summary_issues: "{fail_count} issue(s) found — see above for remediation"

domain:
  software: "Software"
  marketing: "Marketing"
  health: "Health"
  research: "Research"
  management: "Management"
  custom: "Custom"

experience:
  beginner: "Beginner"
  intermediate: "Intermediate"
  expert: "Expert"

error:
  squad:
    not_found: "Squad '{name}' not found in .buildpact/squads/"
    validation_failed: "Validation failed: {count} error(s) found"
  ide:
    config_failed: "Failed to generate IDE config for {ide}: {reason}"
  file:
    write_failed: "Failed to write file '{path}': {reason}"
    read_failed: "Failed to read file '{path}': {reason}"
  network:
    remote_fetch_failed: "Failed to fetch remote resource '{url}': {reason}"
  not_implemented: "'{feature}' is not yet implemented. Available in {phase}."
