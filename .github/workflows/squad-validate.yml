name: Squad Validate

on:
  pull_request:
    paths:
      - 'templates/squads/**'
      - 'test/fixtures/squads/**'

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Squad structure validation tests
        run: npx vitest run --reporter=verbose test/unit/squads/
